<main>
    <section id="showreel">
        <iframe id="showreel-iframe" width="1243" height="699" src="https://www.youtube.com/embed/QNqoa_DPRV4" title="A Will to Live" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>
</main>
<script>
// 1. Handle all internal link clicks safely across all devices
document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', function(e) {
        if (this.hostname === window.location.hostname && this.target !== '_blank') {
            e.preventDefault();
            const href = this.href;
            
            // Trigger your fade-out style immediately on click
            const main = document.querySelector('main');
            if (main) {
                main.style.opacity = 0;
            }

            // The Asynchronous Safety Valve: Delays navigation by 50ms.
            // This clears the thread collision between Instagram's tracker 
            // and Samsung's OS verification layer before running the redirect.
            setTimeout(() => {
                if (document.startViewTransition) {
                    document.startViewTransition(() => {
                        window.location.href = href;
                    });
                } else {
                    window.location.href = href;
                }
            }, 50); 
        }
    });
});

// 2. Handle the smooth fade-in animation when a new page loads
window.addEventListener('load', () => {
    const main = document.querySelector('main');
    if (main) {
        main.style.transition = 'opacity 0.6s ease';
        main.style.opacity = 1;
    }
});
</script>
</body>
